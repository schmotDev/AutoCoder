name: Issue Event Workflow

on:
  issues:
    types: [opened, reopened]

jobs:
  issue_info:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run script
        run: |
          chmod +x ./scripts/script.sh
          ./scripts/script.sh \
            "${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.repository }}" \
            "${{ github.event.issue.number }}" \
            "${{ secrets.OPENROUTER_API_KEY }}"
